# KRT-BL003: registry publication with npm provenance.
#
# Provenance requires a CI OIDC context (`id-token: write`), which is why the
# real publish lives here and not in a local command — see
# tools/scripts/publish-registry.ts, which refuses `--publish` outside CI.
#
# Operator flow:
#   1. Land the release commit (versions computed by `bun run release`,
#      release gate green).
#   2. Configure the `NPM_TOKEN` repository secret (granular automation token
#      with publish rights for the @tuvren scope; minimal scope + short
#      expiry). The token is needed only for the FIRST publish of each
#      package: npm's January 2027 change ends direct publishing with
#      2FA-bypass tokens (github.blog changelog 2026-07-08), so once the
#      packages exist, configure GitHub Actions trusted publishing (OIDC) for
#      all of them on npmjs.com and delete this secret — the workflow already
#      carries `id-token: write` and needs no changes for that switch.
#   3. Trigger this workflow (workflow_dispatch). Leave `dry_run: true` for a
#      full rehearsal; set it to `false` for the real publish.
#   4. After a real publish, run the acceptance check locally:
#      `bun tools/scripts/publish-registry.ts --verify-consumer <version>`.

name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rehearse only (npm publish --dry-run); no registry mutation"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

# Two dispatched publishes must never interleave: npm's duplicate-version
# rejection is the only other guard against a torn release.
concurrency:
  group: registry-publish
  cancel-in-progress: false

jobs:
  publish:
    name: publish curated package set (${{ inputs.dry_run && 'dry run' || 'REAL' }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Same toolchain-parity approach as ci.yml: the publishable set includes
      # @tuvren/kernel-grpc-client, whose build regenerates the gitignored
      # kernel-interop bindings (buf + protoc-gen-es, both devenv-provided).
      # Running inside `devenv shell` publishes with exactly the toolchain the
      # local `bun run verify` release gate was proven against, instead of
      # hand-mirroring individual tools onto the runner.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Install devenv
        run: |
          nix profile install github:NixOS/nixpkgs/1c0fc59a961424afd95e00966e6b6021b65ef605#devenv
          devenv version | grep -F "devenv 2.1.2"

      - name: Set up npm auth
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Build, preflight, publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          devenv shell -- bash -c '
            set -euo pipefail
            bun install --frozen-lockfile
            bun tools/scripts/publish-registry.ts --build
            bun tools/scripts/publish-registry.ts --preflight
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              bun tools/scripts/publish-registry.ts --dry-run
            else
              bun tools/scripts/publish-registry.ts --publish
            fi
          '
