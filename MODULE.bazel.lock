                "BUILD.bazel": "###############################################################################\n# @generated\n# DO NOT MODIFY: This file is auto-generated by a crate_universe tool. To \n# regenerate this file, run the following:\n#\n#     bazel mod show_repo 'tuvren_runtime'\n###############################################################################\n\npackage(default_visibility = [\"//visibility:public\"])\n\nexports_files(\n    [\n        \"cargo-bazel.json\",\n        \"crates.bzl\",\n        \"defs.bzl\",\n    ] + glob(\n        allow_empty = True,\n        include = [\"*.bazel\"],\n    ),\n)\n\nfilegroup(\n    name = \"srcs\",\n    srcs = glob(\n        allow_empty = True,\n        include = [\n            \"*.bazel\",\n            \"*.bzl\",\n        ],\n    ),\n)\n\n# Workspace Member Dependencies\nalias(\n    name = \"ciborium-0.2.2\",\n    actual = \"@crates__ciborium-0.2.2//:ciborium\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"ciborium\",\n    actual = \"@crates__ciborium-0.2.2//:ciborium\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"hex-0.4.3\",\n    actual = \"@crates__hex-0.4.3//:hex\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"hex\",\n    actual = \"@crates__hex-0.4.3//:hex\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"jsonschema-0.46.3\",\n    actual = \"@crates__jsonschema-0.46.3//:jsonschema\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"jsonschema\",\n    actual = \"@crates__jsonschema-0.46.3//:jsonschema\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"prost-0.14.3\",\n    actual = \"@crates__prost-0.14.3//:prost\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"prost\",\n    actual = \"@crates__prost-0.14.3//:prost\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"prost-types-0.14.3\",\n    actual = \"@crates__prost-types-0.14.3//:prost_types\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"prost-types\",\n    actual = \"@crates__prost-types-0.14.3//:prost_types\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"regex-1.12.3\",\n    actual = \"@crates__regex-1.12.3//:regex\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"regex\",\n    actual = \"@crates__regex-1.12.3//:regex\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"serde-1.0.228\",\n    actual = \"@crates__serde-1.0.228//:serde\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"serde\",\n    actual = \"@crates__serde-1.0.228//:serde\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"serde_json-1.0.149\",\n    actual = \"@crates__serde_json-1.0.149//:serde_json\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"serde_json\",\n    actual = \"@crates__serde_json-1.0.149//:serde_json\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"sha2-0.10.9\",\n    actual = \"@crates__sha2-0.10.9//:sha2\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"sha2\",\n    actual = \"@crates__sha2-0.10.9//:sha2\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"thiserror-2.0.18\",\n    actual = \"@crates__thiserror-2.0.18//:thiserror\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"thiserror\",\n    actual = \"@crates__thiserror-2.0.18//:thiserror\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tokio-1.52.1\",\n    actual = \"@crates__tokio-1.52.1//:tokio\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tokio\",\n    actual = \"@crates__tokio-1.52.1//:tokio\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tokio-stream-0.1.18\",\n    actual = \"@crates__tokio-stream-0.1.18//:tokio_stream\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tokio-stream\",\n    actual = \"@crates__tokio-stream-0.1.18//:tokio_stream\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tonic-0.14.5\",\n    actual = \"@crates__tonic-0.14.5//:tonic\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"tonic\",\n    actual = \"@crates__tonic-0.14.5//:tonic\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"t